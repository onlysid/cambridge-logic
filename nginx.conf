server {
    listen 8080;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    location / {
        # Check for static files or directories.
        # If none exist, send the request to the @php named location.
        try_files $uri $uri/ @php;
    }

    location @php {
        # Check if a matching .php file exists. If it does, rewrite the URL.
        # The 'last' flag tells Nginx to restart the location search
        if (-f $document_root$uri.php) {
            rewrite ^(.*)$ $1.php last;
        }
        rewrite ^ /index.php?$query_string last;
    }

    location ~ \.php$ {
        # Security measure: Ensure the PHP file actually exists before passing it to FPM
        try_files $uri =404;
        
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}